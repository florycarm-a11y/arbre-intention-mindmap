<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Arbre d'Intention — Mindmap</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: #FAFAF9;
    color: #1C1917;
    overflow: hidden;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    background: rgba(250, 250, 249, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #E7E5E4;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #1C1917;
  }

  header h1 span {
    color: #78716C;
    font-weight: 400;
    margin-left: 8px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
  }

  .toolbar button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 14px;
    border: 1px solid #D6D3D1;
    background: #FFFFFF;
    color: #44403C;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .toolbar button:hover {
    background: #F5F5F4;
    border-color: #A8A29E;
  }

  .toolbar button:active {
    transform: translateY(1px);
  }

  #chart {
    position: fixed;
    top: 65px;
    left: 0;
    right: 0;
    bottom: 36px;
    width: 100%;
  }

  svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  svg:active { cursor: grabbing; }

  .link {
    fill: none;
    stroke: #D6D3D1;
    stroke-width: 1.5px;
  }

  .node rect {
    stroke-width: 1.5px;
    cursor: pointer;
    transition: filter 0.15s ease;
  }

  .node:hover rect {
    filter: brightness(0.97);
  }

  .node text {
    font-family: inherit;
    pointer-events: none;
    user-select: none;
  }

  .node .label {
    font-size: 13px;
    font-weight: 600;
    fill: #1C1917;
  }

  .node .label.on-dark {
    fill: #FAFAF9;
  }

  .node .quote {
    font-size: 11px;
    font-style: italic;
    fill: #57534E;
  }

  .node .quote.on-dark {
    fill: #E7E5E4;
  }

  .node .desc {
    font-size: 10.5px;
    fill: #57534E;
  }

  .status-dot {
    pointer-events: none;
  }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 8px 24px;
    background: rgba(250, 250, 249, 0.92);
    border-top: 1px solid #E7E5E4;
    font-size: 11px;
    color: #78716C;
    text-align: center;
    z-index: 10;
  }

  .legend {
    display: inline-flex;
    gap: 16px;
    align-items: center;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .legend-dot.obligatoire { background: #DC2626; }
  .legend-dot.optionnel { background: #A8A29E; }

  .node-input {
    width: 100%;
    height: 100%;
    border: 1px solid #D6D3D1;
    border-radius: 6px;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 10.5px;
    line-height: 1.3;
    color: #1C1917;
    background: #FAFAF9;
    resize: none;
    outline: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .node-input:focus {
    border-color: #78716C;
    background: #FFFFFF;
  }

  .node-input::placeholder {
    color: #A8A29E;
    font-style: italic;
  }

  .node-input.filled {
    border-color: #16A34A;
    background: #F0FDF4;
  }

  .toolbar button.primary {
    background: #1C1917;
    color: #FAFAF9;
    border-color: #1C1917;
  }

  .toolbar button.primary:hover {
    background: #292524;
  }

  .toolbar button.danger {
    color: #DC2626;
    border-color: #FECACA;
  }

  .toolbar button.danger:hover {
    background: #FEF2F2;
    border-color: #DC2626;
  }

  .progress {
    font-size: 12px;
    color: #57534E;
    font-weight: 500;
    white-space: nowrap;
  }

  .progress .count {
    color: #16A34A;
    font-weight: 600;
  }

  .progress .count.incomplete {
    color: #DC2626;
  }

  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: #FFFFFF;
    border-radius: 12px;
    padding: 24px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .modal h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .modal pre {
    background: #F5F5F4;
    border: 1px solid #E7E5E4;
    border-radius: 8px;
    padding: 16px;
    font-size: 11px;
    line-height: 1.5;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .modal .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: flex-end;
  }

  .modal button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #D6D3D1;
    background: #FFFFFF;
    color: #44403C;
    transition: all 0.15s ease;
  }

  .modal button:hover { background: #F5F5F4; }

  .modal button.primary {
    background: #1C1917;
    color: #FAFAF9;
    border-color: #1C1917;
  }

  .modal button.primary:hover { background: #292524; }
</style>
</head>
<body>

<header>
  <h1>L'Arbre d'Intention <span>— framework de cadrage avant délégation</span></h1>
  <div class="toolbar">
    <span class="progress" id="progress"></span>
    <button id="btn-expand">Tout déplier</button>
    <button id="btn-collapse">Tout replier</button>
    <button id="btn-reset">Recentrer</button>
    <button id="btn-export" class="primary">Exporter CLAUDE.md</button>
    <button id="btn-clear" class="danger">Effacer</button>
  </div>
</header>

<div id="chart"></div>

<footer>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot obligatoire"></span>obligatoire</span>
    <span class="legend-item"><span class="legend-dot optionnel"></span>optionnel</span>
    <span>·</span>
    <span>clic sur un nœud pour plier/déplier · remplissez les champs pour construire votre arbre · molette pour zoomer</span>
  </div>
</footer>

<script>
// ============================================================================
// DATA — L'Arbre d'Intention
// ============================================================================
const data = {
  name: "L'Arbre d'Intention",
  color: "#1C1917",
  isRoot: true,
  children: [
    {
      name: "01 — Le projet",
      color: "#64748B",
      quote: "Nommez-le précisément. Un projet mal nommé produit des intentions floues — et des agents qui travaillent à côté.",
      children: [
        { name: "Nom du projet", status: "obligatoire", id: "projet_nom", description: "Un nom opérationnel, pas une catégorie" },
        { name: "Contexte", status: "optionnel", id: "projet_contexte", description: "Pourquoi ce projet existe maintenant ? L'agent ne l'aura pas si vous ne l'écrivez pas" }
      ]
    },
    {
      name: "02 — L'intention stratégique",
      color: "#B91C1C",
      quote: "Qui, au sommet, sera satisfait ou insatisfait — indépendamment de la qualité technique ?",
      children: [
        { name: "Porteur", status: "optionnel", id: "strategique_porteur", description: "Qui juge si le résultat global est un succès ou un échec ?" },
        { name: "Intention", status: "obligatoire", id: "strategique_intention", description: "Pas un objectif chiffré. La finalité dont l'absence invalide tout" },
        { name: "Test d'invalidation", status: "optionnel", id: "strategique_test", description: "Exécution réussie mais intention violée" }
      ]
    },
    {
      name: "03 — L'intention tactique",
      color: "#EA580C",
      quote: "Qui pilote au quotidien ? Cette personne a sa propre définition du succès.",
      children: [
        { name: "Porteur", status: "optionnel", id: "tactique_porteur", description: "Celui qui traduit la stratégie en plan d'action" },
        { name: "Intention", status: "obligatoire", id: "tactique_intention", description: "La finalité dont l'absence invalide le résultat, même si l'exécution est parfaite" },
        { name: "Test d'invalidation", status: "optionnel", id: "tactique_test", description: "Le niveau stratégique est satisfait, mais celui-ci est violé" }
      ]
    },
    {
      name: "04 — L'intention opérationnelle",
      color: "#047857",
      quote: "Qui exécute ? Ses contraintes sont légitimes — les niveaux supérieurs ne les voient souvent pas.",
      children: [
        { name: "Porteur", status: "optionnel", id: "operationnel_porteur", description: "Celui dont les mains sont sur le clavier" },
        { name: "Intention", status: "obligatoire", id: "operationnel_intention", description: "La finalité dont l'absence invalide le résultat, même si l'exécution est parfaite" },
        { name: "Test d'invalidation", status: "optionnel", id: "operationnel_test", description: "Situation où l'exécution est réussie mais l'intention est violée" }
      ]
    },
    {
      name: "05 — Les tensions",
      color: "#7C3AED",
      quote: "Deux intentions légitimes qui prescrivent des actions incompatibles. Si vous n'en trouvez aucune, vous n'avez pas assez cherché.",
      children: [
        {
          name: "Stratégique ↔ Tactique",
          children: [
            { name: "Contradiction concrète", status: "optionnel", id: "tension_strat_tact", description: "Quelle action l'une prescrit-elle que l'autre interdit ?" }
          ]
        },
        {
          name: "Tactique ↔ Opérationnel",
          children: [
            { name: "Contradiction concrète", status: "optionnel", id: "tension_tact_ope", description: "Quelle action l'une prescrit-elle que l'autre interdit ?" }
          ]
        },
        {
          name: "Stratégique ↔ Opérationnel",
          children: [
            { name: "Contradiction concrète", status: "optionnel", id: "tension_strat_ope", description: "Quelle action l'une prescrit-elle que l'autre interdit ?" }
          ]
        }
      ]
    },
    {
      name: "06 — Arbitrage",
      color: "#4338CA",
      quote: "Arbitrer signifie décider qui perd quelque chose. Si personne ne perd rien, vous n'avez pas tranché.",
      children: [
        {
          name: "Stratégique ↔ Tactique",
          children: [
            { name: "Quelle intention prime ?", status: "obligatoire", id: "arbitrage_strat_tact_prime", description: "Tranchez — sans quoi l'agent choisira pour vous" },
            { name: "Sacrifice", status: "optionnel", id: "arbitrage_strat_tact_sacrifice", description: "Nommez ce qui est perdu" }
          ]
        },
        {
          name: "Tactique ↔ Opérationnel",
          children: [
            { name: "Quelle intention prime ?", status: "obligatoire", id: "arbitrage_tact_ope_prime", description: "Tranchez — sans quoi l'agent choisira pour vous" },
            { name: "Sacrifice", status: "optionnel", id: "arbitrage_tact_ope_sacrifice", description: "Nommez ce qui est perdu" }
          ]
        },
        {
          name: "Stratégique ↔ Opérationnel",
          children: [
            { name: "Quelle intention prime ?", status: "obligatoire", id: "arbitrage_strat_ope_prime", description: "Tranchez — sans quoi l'agent choisira pour vous" },
            { name: "Sacrifice", status: "optionnel", id: "arbitrage_strat_ope_sacrifice", description: "Nommez ce qui est perdu" }
          ]
        }
      ]
    },
    {
      name: "07 — Garde-fous",
      color: "#B45309",
      quote: "La délégation requiert des garde-fous de la même façon que l'aviation requiert des checklists.",
      children: [
        { name: "L'agent ne doit JAMAIS…", status: "obligatoire", id: "gardefous_jamais", description: "Les lignes rouges spécifiques à ce projet, pas des bonnes pratiques génériques" },
        { name: "L'agent s'arrête et demande quand…", status: "obligatoire", id: "gardefous_arret", description: "Les frontières de la délégation" },
        { name: "Test des 3 phrases", status: "obligatoire", id: "gardefous_test3", description: "3 phrases qu'un observateur indépendant utiliserait pour valider le résultat, sans vous poser de question" }
      ]
    },
    {
      name: "08 — Votre arbre (synthèse)",
      color: "#1C1917",
      quote: "La structure de vos décisions. Ce document est prêt à être encodé dans un CLAUDE.md ou un system prompt.",
      children: [
        { name: "Visualisation de l'arbre", description: "Les 3 nœuds : Stratégique / Tactique / Opérationnel" },
        { name: "Tensions résolues", description: "✓ résolu entre chaque paire de nœuds" },
        {
          name: "Diagnostic — ESSENTIEL",
          children: [
            { name: "Projet nommé", status: "obligatoire" },
            { name: "Intention stratégique", status: "obligatoire" },
            { name: "Intention tactique", status: "obligatoire" },
            { name: "Intention opérationnelle", status: "obligatoire" }
          ]
        },
        {
          name: "Diagnostic — IMPORTANT",
          children: [
            { name: "Au moins une tension identifiée", status: "optionnel" },
            { name: "Tensions arbitrées", status: "optionnel" },
            { name: "Interdictions posées", status: "optionnel" },
            { name: "Critères de validation", status: "optionnel" }
          ]
        }
      ]
    }
  ]
};

// ============================================================================
// USER ANSWERS STORE
// ============================================================================
const STORAGE_KEY = "arbre-intention-answers";
let userAnswers = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) userAnswers = JSON.parse(saved);
} catch(e) {}

function saveAnswers() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
  updateProgress();
}

// Collect all editable node IDs grouped by status
const obligatoireIds = [];
const optionnelIds = [];
(function collectIds(node) {
  if (node.id && node.status === "obligatoire") obligatoireIds.push(node.id);
  if (node.id && node.status === "optionnel") optionnelIds.push(node.id);
  if (node.children) node.children.forEach(collectIds);
})(data);

const progressEl = document.getElementById("progress");
function updateProgress() {
  const filled = obligatoireIds.filter(id => userAnswers[id]?.trim());
  const total = obligatoireIds.length;
  progressEl.innerHTML = `<span class="count ${filled.length < total ? 'incomplete' : ''}">${filled.length}/${total}</span> obligatoires`;
}

// ============================================================================
// RENDER
// ============================================================================

const container = document.getElementById("chart");
const svg = d3.select("#chart").append("svg")
  .attr("xmlns", "http://www.w3.org/2000/svg");

const g = svg.append("g");

// Zoom behavior — filter out events from textareas
const zoom = d3.zoom()
  .scaleExtent([0.3, 2.5])
  .filter(event => {
    if (event.target.tagName === "TEXTAREA") return false;
    return true;
  })
  .on("zoom", (event) => {
    g.attr("transform", event.transform);
  });

svg.call(zoom);

// Tree layout
const dx = 58;   // vertical spacing (increased for inputs)
const dy = 290;  // horizontal spacing between levels

const tree = d3.tree().nodeSize([dx, dy]);

// Build hierarchy
const root = d3.hierarchy(data);
root.x0 = 0;
root.y0 = 0;

// Inherit branch color from level-1 ancestor
root.descendants().forEach((d, i) => {
  d.id = d.data.id || ("node_" + i);
  d._children = d.children;
  if (d.depth >= 2) d.children = null;
  if (d.depth === 0) d.branchColor = "#1C1917";
  else if (d.depth === 1) d.branchColor = d.data.color || "#44403C";
  else d.branchColor = d.parent.branchColor;
});

let _firstRender = true;

function update(source) {
  const duration = _firstRender ? 0 : 350;
  const nodes = root.descendants().reverse();
  const links = root.links();

  tree(root);

  let left = root, right = root;
  root.eachBefore((n) => {
    if (n.x < left.x) left = n;
    if (n.x > right.x) right = n;
  });

  const transition = svg.transition()
    .duration(duration);

  // ---- Links ----
  const link = g.selectAll("path.link")
    .data(links, d => d.target.id);

  const linkEnter = link.enter().append("path")
    .attr("class", "link")
    .attr("d", d => {
      if (_firstRender) return diagonal(d);
      const o = { x: source.x0, y: source.y0 };
      return diagonal({ source: o, target: o });
    })
    .attr("stroke", d => d.target.branchColor)
    .attr("stroke-opacity", 0.5);

  link.merge(linkEnter).transition(transition)
    .attr("d", diagonal)
    .attr("stroke", d => d.target.branchColor)
    .attr("stroke-opacity", 0.5);

  link.exit().transition(transition).remove()
    .attr("d", d => {
      const o = { x: source.x, y: source.y };
      return diagonal({ source: o, target: o });
    });

  // ---- Nodes ----
  const node = g.selectAll("g.node")
    .data(nodes, d => d.id);

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => _firstRender ? `translate(${d.y},${d.x})` : `translate(${source.y0},${source.x0})`)
    .attr("fill-opacity", _firstRender ? 1 : 0)
    .attr("stroke-opacity", _firstRender ? 1 : 0)
    .on("click", (event, d) => {
      const tag = event.target.tagName;
      if (tag === "TEXTAREA" || tag === "INPUT") return;
      d.children = d.children ? null : d._children;
      update(d);
    });

  // Rect
  nodeEnter.append("rect")
    .attr("rx", 10)
    .attr("ry", 10)
    .each(function(d) {
      const dims = computeNodeDims(d);
      d3.select(this)
        .attr("x", dims.x)
        .attr("y", dims.y)
        .attr("width", dims.width)
        .attr("height", dims.height)
        .attr("fill", getNodeFill(d))
        .attr("stroke", d.branchColor);
    });

  // Status dot
  nodeEnter.filter(d => d.data.status)
    .append("circle")
    .attr("class", "status-dot")
    .attr("r", 4)
    .each(function(d) {
      const dims = computeNodeDims(d);
      d3.select(this)
        .attr("cx", dims.x + 12)
        .attr("cy", dims.y + 14)
        .attr("fill", d.data.status === "obligatoire" ? "#DC2626" : "#A8A29E");
    });

  // Label
  nodeEnter.append("text")
    .attr("class", d => "label" + (shouldInvertText(d) ? " on-dark" : ""))
    .each(function(d) {
      const dims = computeNodeDims(d);
      const hasDot = !!d.data.status;
      d3.select(this)
        .attr("x", dims.x + (hasDot ? 24 : 14))
        .attr("y", dims.y + 18)
        .text(d.data.name);
    });

  // Quote (level 1)
  nodeEnter.filter(d => d.data.quote)
    .append("foreignObject")
    .each(function(d) {
      const dims = computeNodeDims(d);
      d3.select(this)
        .attr("x", dims.x + 14)
        .attr("y", dims.y + 26)
        .attr("width", dims.width - 28)
        .attr("height", dims.height - 32);
    })
    .append("xhtml:div")
    .attr("class", d => "quote" + (shouldInvertText(d) ? " on-dark" : ""))
    .style("font-size", "11px")
    .style("font-style", "italic")
    .style("line-height", "1.4")
    .style("color", d => shouldInvertText(d) ? "#E7E5E4" : "#57534E")
    .html(d => "\u00ab " + d.data.quote + " \u00bb");

  // Description (for non-editable, non-quote nodes)
  nodeEnter.filter(d => d.data.description && !d.data.quote && !d.data.id)
    .append("foreignObject")
    .each(function(d) {
      const dims = computeNodeDims(d);
      const hasDot = !!d.data.status;
      d3.select(this)
        .attr("x", dims.x + (hasDot ? 24 : 14))
        .attr("y", dims.y + 24)
        .attr("width", dims.width - (hasDot ? 38 : 28))
        .attr("height", dims.height - 30);
    })
    .append("xhtml:div")
    .style("font-size", "10.5px")
    .style("line-height", "1.4")
    .style("color", "#57534E")
    .html(d => d.data.description);

  // Editable textarea (for nodes with an id)
  nodeEnter.filter(d => d.data.id)
    .append("foreignObject")
    .attr("class", "input-fo")
    .each(function(d) {
      const dims = computeNodeDims(d);
      d3.select(this)
        .attr("x", dims.x + 12)
        .attr("y", dims.y + 24)
        .attr("width", dims.width - 24)
        .attr("height", dims.height - 30);
    })
    .append("xhtml:textarea")
    .attr("class", d => "node-input" + (userAnswers[d.data.id]?.trim() ? " filled" : ""))
    .attr("placeholder", d => d.data.description || (d.data.status === "obligatoire" ? "Requis…" : "Optionnel…"))
    .attr("aria-label", d => d.data.name)
    .property("value", d => userAnswers[d.data.id] || "")
    .on("input", function(event, d) {
      userAnswers[d.data.id] = this.value;
      this.classList.toggle("filled", !!this.value.trim());
      saveAnswers();
    })
    .on("mousedown", function(event) { event.stopPropagation(); })
    .on("click", function(event) { event.stopPropagation(); });

  // Expand indicator (+/-)
  nodeEnter.filter(d => d._children)
    .append("circle")
    .attr("class", "toggle")
    .attr("r", 7)
    .each(function(d) {
      const dims = computeNodeDims(d);
      d3.select(this)
        .attr("cx", dims.x + dims.width)
        .attr("cy", 0)
        .attr("fill", "#FFFFFF")
        .attr("stroke", d.branchColor)
        .attr("stroke-width", 1.5);
    });

  nodeEnter.filter(d => d._children)
    .append("text")
    .attr("class", "toggle-label")
    .each(function(d) {
      const dims = computeNodeDims(d);
      d3.select(this)
        .attr("x", dims.x + dims.width)
        .attr("y", 0)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("font-size", "11px")
        .attr("font-weight", "600")
        .attr("fill", d.branchColor)
        .text(d.children ? "\u2212" : "+");
    });

  // Merge enter + update
  const merged = node.merge(nodeEnter);
  if (_firstRender) {
    merged
      .attr("transform", d => `translate(${d.y},${d.x})`)
      .attr("fill-opacity", 1)
      .attr("stroke-opacity", 1);
  } else {
    merged.transition(transition)
      .attr("transform", d => `translate(${d.y},${d.x})`)
      .attr("fill-opacity", 1)
      .attr("stroke-opacity", 1);
  }

  node.merge(nodeEnter).select("text.toggle-label")
    .text(d => d.children ? "\u2212" : "+");

  node.merge(nodeEnter).each(function(d) {
    const sel = d3.select(this);
    if (!d._children) {
      sel.selectAll(".toggle").remove();
      sel.selectAll(".toggle-label").remove();
    } else if (sel.selectAll(".toggle").empty()) {
      const dims = computeNodeDims(d);
      sel.append("circle")
        .attr("class", "toggle")
        .attr("r", 7)
        .attr("cx", dims.x + dims.width)
        .attr("cy", 0)
        .attr("fill", "#FFFFFF")
        .attr("stroke", d.branchColor)
        .attr("stroke-width", 1.5);
      sel.append("text")
        .attr("class", "toggle-label")
        .attr("x", dims.x + dims.width)
        .attr("y", 0)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("font-size", "11px")
        .attr("font-weight", "600")
        .attr("fill", d.branchColor)
        .text(d.children ? "\u2212" : "+");
    }
  });

  // Exit
  node.exit().transition(transition).remove()
    .attr("transform", d => `translate(${source.y},${source.x})`)
    .attr("fill-opacity", 0)
    .attr("stroke-opacity", 0);

  root.eachBefore(d => {
    d.x0 = d.x;
    d.y0 = d.y;
  });

  _firstRender = false;
}

// ---------- Helpers ----------

function diagonal(d) {
  return `M${d.source.y + getNodeDimsFor(d.source).width / 2 + getNodeDimsFor(d.source).x},${d.source.x}
          C${(d.source.y + d.target.y) / 2},${d.source.x}
           ${(d.source.y + d.target.y) / 2},${d.target.x}
           ${d.target.y + getNodeDimsFor(d.target).x},${d.target.x}`;
}

function computeNodeDims(d) {
  if (d.depth === 0) {
    return { x: -90, y: -22, width: 180, height: 44 };
  }
  if (d.depth === 1) {
    return { x: -115, y: -50, width: 230, height: 100 };
  }
  // Editable nodes are taller to fit the textarea
  const isEditable = !!d.data.id;
  if (d.depth === 2) {
    if (isEditable) return { x: -110, y: -28, width: 220, height: 80 };
    const hasDesc = !!d.data.description;
    return { x: -130, y: hasDesc ? -34 : -16, width: 260, height: hasDesc ? 72 : 32 };
  }
  // depth 3+
  if (isEditable) return { x: -100, y: -24, width: 200, height: 72 };
  const hasDesc = !!d.data.description;
  return { x: -100, y: hasDesc ? -22 : -14, width: 200, height: hasDesc ? 48 : 28 };
}

function getNodeDimsFor(d) {
  return computeNodeDims(d);
}

function getNodeFill(d) {
  if (d.depth === 0) return "#1C1917";
  if (d.depth === 1) return d.branchColor;
  if (d.depth === 2) return "#FFFFFF";
  return "#F5F5F4";
}

function shouldInvertText(d) {
  return d.depth === 0 || d.depth === 1;
}

function computeWidth(root) {
  let maxDepth = 0;
  root.each(d => { if (d.depth > maxDepth) maxDepth = d.depth; });
  return (maxDepth + 1) * dy;
}

// ---------- Export CLAUDE.md ----------

function generateExport() {
  const a = userAnswers;
  const v = id => (a[id] || "").trim();

  let md = `# Arbre d'Intention \u2014 ${v("projet_nom") || "Sans nom"}\n\n`;
  md += `> G\u00e9n\u00e9r\u00e9 le ${new Date().toLocaleDateString("fr-FR")} via L'Arbre d'Intention\n\n`;

  // Projet
  md += `## Projet\n`;
  md += `- **Nom** : ${v("projet_nom") || "\u2014"}\n`;
  if (v("projet_contexte")) md += `- **Contexte** : ${v("projet_contexte")}\n`;
  md += `\n`;

  // Intentions
  const intentions = [
    { title: "Intention strat\u00e9gique", prefix: "strategique" },
    { title: "Intention tactique", prefix: "tactique" },
    { title: "Intention op\u00e9rationnelle", prefix: "operationnel" }
  ];
  for (const { title, prefix } of intentions) {
    md += `## ${title}\n`;
    if (v(`${prefix}_porteur`)) md += `- **Porteur** : ${v(`${prefix}_porteur`)}\n`;
    md += `- **Intention** : ${v(`${prefix}_intention`) || "\u2014"}\n`;
    if (v(`${prefix}_test`)) md += `- **Test d'invalidation** : ${v(`${prefix}_test`)}\n`;
    md += `\n`;
  }

  // Tensions
  const tensions = [
    { title: "Strat\u00e9gique \u2194 Tactique", id: "tension_strat_tact" },
    { title: "Tactique \u2194 Op\u00e9rationnel", id: "tension_tact_ope" },
    { title: "Strat\u00e9gique \u2194 Op\u00e9rationnel", id: "tension_strat_ope" }
  ];
  const hasTensions = tensions.some(t => v(t.id));
  if (hasTensions) {
    md += `## Tensions identifi\u00e9es\n`;
    for (const t of tensions) {
      if (v(t.id)) md += `### ${t.title}\n${v(t.id)}\n\n`;
    }
  }

  // Arbitrages
  const arbitrages = [
    { title: "Strat\u00e9gique \u2194 Tactique", prime: "arbitrage_strat_tact_prime", sacrifice: "arbitrage_strat_tact_sacrifice" },
    { title: "Tactique \u2194 Op\u00e9rationnel", prime: "arbitrage_tact_ope_prime", sacrifice: "arbitrage_tact_ope_sacrifice" },
    { title: "Strat\u00e9gique \u2194 Op\u00e9rationnel", prime: "arbitrage_strat_ope_prime", sacrifice: "arbitrage_strat_ope_sacrifice" }
  ];
  const hasArbitrages = arbitrages.some(a => v(a.prime));
  if (hasArbitrages) {
    md += `## Arbitrages\n`;
    for (const arb of arbitrages) {
      if (v(arb.prime)) {
        md += `### ${arb.title}\n`;
        md += `- **Priorit\u00e9** : ${v(arb.prime)}\n`;
        if (v(arb.sacrifice)) md += `- **Sacrifice** : ${v(arb.sacrifice)}\n`;
        md += `\n`;
      }
    }
  }

  // Garde-fous
  md += `## Garde-fous\n`;
  md += `### L'agent ne doit JAMAIS :\n${v("gardefous_jamais") || "\u2014"}\n\n`;
  md += `### L'agent s'arr\u00eate et demande quand :\n${v("gardefous_arret") || "\u2014"}\n\n`;
  md += `### Test des 3 phrases :\n${v("gardefous_test3") || "\u2014"}\n`;

  return md;
}

function showExportModal() {
  // Check obligatoires
  const missing = obligatoireIds.filter(id => !userAnswers[id]?.trim());

  const md = generateExport();

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  let warningHtml = "";
  if (missing.length > 0) {
    warningHtml = `<p style="color:#DC2626;font-size:12px;margin-bottom:12px;">\u26a0 ${missing.length} champ(s) obligatoire(s) non rempli(s)</p>`;
  }

  overlay.innerHTML = `
    <div class="modal">
      <h2>Export CLAUDE.md</h2>
      ${warningHtml}
      <pre>${md.replace(/</g, "&lt;")}</pre>
      <div class="modal-actions">
        <button onclick="this.closest('.modal-overlay').remove()">Fermer</button>
        <button onclick="navigator.clipboard.writeText(generateExport()).then(()=>{this.textContent='Copi\u00e9 !';setTimeout(()=>this.textContent='Copier',1500)})">Copier</button>
        <button class="primary" onclick="downloadExport()">T\u00e9l\u00e9charger</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
}

function downloadExport() {
  const md = generateExport();
  const blob = new Blob([md], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "CLAUDE.md";
  a.click();
  URL.revokeObjectURL(url);
}

// ---------- Controls ----------

function expandAll() {
  root.each(d => {
    if (d._children) d.children = d._children;
  });
  update(root);
  setTimeout(fitToView, 360);
}

function collapseAll() {
  root.each(d => {
    if (d.depth >= 1 && d._children) d.children = null;
  });
  root.children = root._children;
  update(root);
  setTimeout(fitToView, 360);
}

function resetView() {
  root.each(d => {
    if (d.depth >= 2 && d._children) d.children = null;
    if (d.depth < 2 && d._children) d.children = d._children;
  });
  update(root);
  setTimeout(fitToView, 360);
}

function clearAll() {
  if (!confirm("Effacer toutes vos r\u00e9ponses ? Cette action est irr\u00e9versible.")) return;
  userAnswers = {};
  saveAnswers();
  // Re-render to reset textareas
  g.selectAll("g.node").remove();
  g.selectAll("path.link").remove();
  update(root);
  setTimeout(fitToView, 360);
}

function fitToView() {
  const bounds = g.node().getBBox();
  const containerRect = container.getBoundingClientRect();
  const fullWidth = containerRect.width;
  const fullHeight = containerRect.height;

  if (bounds.width === 0 || bounds.height === 0) return;

  const scale = Math.min(
    0.95,
    Math.min(fullWidth / bounds.width, fullHeight / bounds.height) * 0.92
  );
  const tx = fullWidth / 2 - scale * (bounds.x + bounds.width / 2);
  const ty = fullHeight / 2 - scale * (bounds.y + bounds.height / 2);

  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ---------- Bindings ----------

document.getElementById("btn-expand").addEventListener("click", expandAll);
document.getElementById("btn-collapse").addEventListener("click", collapseAll);
document.getElementById("btn-reset").addEventListener("click", resetView);
document.getElementById("btn-export").addEventListener("click", showExportModal);
document.getElementById("btn-clear").addEventListener("click", clearAll);

window.addEventListener("resize", () => {
  clearTimeout(window._fitTimer);
  window._fitTimer = setTimeout(fitToView, 150);
});

// Initial render
updateProgress();
update(root);
// fitToView immediately since nodes are already placed (no transition to wait for)
requestAnimationFrame(() => fitToView());
</script>
